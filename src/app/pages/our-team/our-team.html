<section class="team-section">

  <h1 class="page-title">Our Team</h1>

  <div
    class="member-card"
    *ngFor="let member of teamMembers">

    <div class="member-content">

      <h2>{{ member.designation }}</h2>

      <h3>{{ member.name }}</h3>

      <h4>{{ member.qualification }}</h4>

      <p>
        {{ member.description }}
      </p>

    </div>

    <div class="member-image">
      <img
        [src]="member.image"
        [alt]="member.name">
    </div>

  </div>

  <div class="developers-section">

    <h2>JR Web Developers</h2>

    <div class="developer-grid">

      <div
        class="developer-card"
        *ngFor="let developer of developers">

        <img
          [src]="developer.image"
          [alt]="developer.name">

        <h4>{{ developer.name }}</h4>

        <p>{{ developer.role }}</p>

      </div>

    </div>

  </div>

</section>
